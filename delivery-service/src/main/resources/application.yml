server:
  port: 8083

spring:
  application:
    name: delivery-service
  datasource:
    url: jdbc:h2:mem:delivery-db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mvc:
    servlet:
      path: /api/v1

resilience4j:
  circuitbreaker:
    instances:
      deliveryControllerCB:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - com.chaykin.common.exception.ServiceException
